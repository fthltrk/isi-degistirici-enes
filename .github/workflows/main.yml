name: Windows EXE Yapici
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Kutuphaneleri Yukle ve Paketle
      run: |
        pip install customtkinter pyinstaller
        pyinstaller --noconsole --onefile program.py
    - name: EXE'yi Yukle
      uses: actions/upload-artifact@v4
      with:
        name: Gercek-Windows-Programiniz
        path: dist/program.exe
